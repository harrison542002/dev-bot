name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: windows
            goarch: arm64
            suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o devbot-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} \
            ./cmd

      - name: Archive (Unix)
        if: matrix.goos != 'windows'
        run: |
          tar -czf devbot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            devbot-${{ matrix.goos }}-${{ matrix.goarch }} \
            config.example.yaml \
            README.md

      - name: Archive (Windows)
        if: matrix.goos == 'windows'
        run: |
          zip devbot-${{ matrix.goos }}-${{ matrix.goarch }}.zip \
            devbot-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} \
            config.example.yaml \
            README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devbot-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            devbot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            devbot-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          if-no-files-found: ignore

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
          fail_on_unmatched_files: true
